<!DOCTYPE html>
<html lang="vi">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sổ tay chuyển đổi số</title>

    <link rel="icon" href="data:," />

    <!-- ================= CSS ================= -->
    <style>
      /* ===== Global ===== */

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto;
        background: linear-gradient(135deg, #0f1115, #1a1d24);
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* ===== Toolbar ===== */

      #toolbar {
        position: fixed;
        top: 18px;

        display: flex;
        align-items: center;
        gap: 10px;

        background: rgba(30, 30, 35, 0.85);
        padding: 10px 16px;

        border-radius: 14px;
        backdrop-filter: blur(12px);

        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);

        z-index: 10;
      }

      /* ===== Buttons ===== */

      button {
        border: none;

        padding: 10px 16px;

        font-size: 14px;

        border-radius: 8px;

        cursor: pointer;

        background: #2563eb;
        color: white;

        display: flex;
        align-items: center;
        gap: 6px;

        transition: all 0.2s ease;
      }

      button:hover {
        transform: translateY(-2px);

        box-shadow: 0 5px 14px rgba(0, 0, 0, 0.35);

        background: #1d4ed8;
      }

      .download {
        background: #16a34a;
      }

      .download:hover {
        background: #15803d;
      }

      /* ===== Page counter ===== */

      #pageNum {
        color: #e5e7eb;

        font-size: 14px;

        padding-left: 6px;

        opacity: 0.9;
      }

      /* ===== Flipbook container ===== */

      #flipbook {
        width: 92vw;

        max-width: 1000px;

        height: 88vh;

        margin-top: 80px;

        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);

        border-radius: 6px;

        overflow: hidden;
      }

      /* ===== Page ===== */

      .page {
        background: white;

        display: flex;

        justify-content: center;

        align-items: center;
      }

      /* ===== Canvas ===== */

      canvas {
        width: 100%;

        height: 100%;
      }

      /* ===== Mobile ===== */

      @media (max-width: 600px) {
        #toolbar {
          top: 10px;

          padding: 8px 10px;
        }

        button {
          padding: 8px 12px;

          font-size: 13px;
        }

        #flipbook {
          height: 90vh;
        }
      }
    </style>
  </head>

  <body>
    <!-- ================= Toolbar ================= -->

    <div id="toolbar">
      <button onclick="prevPage()">◀ Trang trước</button>

      <button onclick="nextPage()">Trang sau ▶</button>

      <a href="so_tay_chuyen_doi_so.pdf" download>
        <button class="download">⬇ Tải PDF</button>
      </a>

      <span id="pageNum"></span>
    </div>

    <!-- ================= Flipbook ================= -->

    <div id="flipbook"></div>

    <!-- ================= Libraries ================= -->

    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- ================= Script ================= -->

    <script>
      /* ===== PDF Worker ===== */

      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      /* ===== PDF File ===== */

      const url = "so_tay_ver1.2.pdf";

      /* ===== Container ===== */

      const container = document.getElementById("flipbook");

      /* ===== Flipbook ===== */

      const pageFlip = new St.PageFlip(container, {
        width: 550,
        height: 733,

        size: "stretch",

        minWidth: 315,
        maxWidth: 1000,

        minHeight: 400,
        maxHeight: 1533,

        showCover: true,

        mobileScrollSupport: true,
      });

      /* ===== Navigation ===== */

      function nextPage() {
        pageFlip.flipNext();
      }

      function prevPage() {
        pageFlip.flipPrev();
      }

      /* ===== Page Counter ===== */

      pageFlip.on("flip", (e) => {
        document.getElementById("pageNum").innerText =
          e.data + 1 + " / " + pageFlip.getPageCount();
      });

      /* ===== Load PDF ===== */

      pdfjsLib.getDocument(url).promise.then((pdf) => {
        let pages = [];

        for (let i = 1; i <= pdf.numPages; i++) {
          pdf.getPage(i).then((page) => {
            const viewport = page.getViewport({ scale: 2 });

            const canvas = document.createElement("canvas");

            const context = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            page.render({
              canvasContext: context,
              viewport: viewport,
            });

            const div = document.createElement("div");

            div.className = "page";

            div.appendChild(canvas);

            pages.push(div);

            if (pages.length === pdf.numPages) {
              pageFlip.loadFromHTML(pages);
            }
          });
        }
      });
    </script>
  </body>
</html>
