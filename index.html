<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sổ tay chuyển đổi số</title>

<link rel="icon" href="data:,">

<style>

body{
margin:0;
background:#0f1115;
font-family:system-ui;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

/* ===== Toolbar ===== */

#toolbar{
position:fixed;
top:20px;
display:flex;
gap:10px;
background:rgba(30,30,35,0.85);
padding:10px 14px;
border-radius:12px;
backdrop-filter:blur(10px);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
z-index:10;
}

button{
border:none;
padding:10px 18px;
font-size:15px;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
transition:all .2s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.download{
background:#16a34a;
}

.download:hover{
background:#15803d;
}

#pageNum{
color:white;
padding:10px;
font-size:14px;
}

/* ===== Flipbook ===== */

#flipbook{
width:95vw;
max-width:1500px;
height:85vh;
margin-top:80px;
}

.page{
background:white;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
width:100%;
height:100%;
}

</style>

</head>

<body>

<!-- ===== Toolbar ===== -->

<div id="toolbar">

<button onclick="prevPage()">◀</button>

<button onclick="nextPage()">▶</button>

<a href="so_tay_ver1.2.pdf" download>
<button class="download">⬇ Download</button>
</a>

<span id="pageNum"></span>

</div>

<!-- ===== Flipbook ===== -->

<div id="flipbook"></div>

<!-- ===== Libraries ===== -->

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

/* ===== Fix PDF worker error ===== */

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ===== PDF file ===== */

const url="so_tay_ver1.2.pdf";

/* ===== Container ===== */

const container=document.getElementById("flipbook");

/* ===== Detect mobile ===== */

const isMobile = window.innerWidth < 768;

/* ===== Flipbook ===== */

const pageFlip=new St.PageFlip(container,{
width:500,
height:700,

size:"stretch",

showCover:true,

mobileScrollSupport:true,

usePortrait:true,

swipeDistance:30,

autoSize:true
});

/* ===== Buttons ===== */

function nextPage(){
pageFlip.flipNext();
}

function prevPage(){
pageFlip.flipPrev();
}

/* ===== Page counter ===== */

pageFlip.on("flip",(e)=>{
document.getElementById("pageNum").innerText =
(e.data + 1) + " / " + pageFlip.getPageCount();
});

/* ===== Load PDF ===== */

pdfjsLib.getDocument(url).promise.then(pdf=>{

let pages=[];

for(let i=1;i<=pdf.numPages;i++){

pdf.getPage(i).then(page=>{

const viewport=page.getViewport({scale:2});

const canvas=document.createElement("canvas");
const context=canvas.getContext("2d");

canvas.width=viewport.width;
canvas.height=viewport.height;

page.render({
canvasContext:context,
viewport:viewport
});

const div=document.createElement("div");
div.className="page";

div.appendChild(canvas);

container.appendChild(div);

pages.push(div);

if(pages.length===pdf.numPages){

pageFlip.loadFromHTML(pages);

/* ===== Mobile single page ===== */

if(isMobile){
pageFlip.updateOrientation("portrait");
}else{
pageFlip.updateOrientation("landscape");
}

}

});

}

});

/* ===== Responsive orientation ===== */

window.addEventListener("resize",()=>{

if(window.innerWidth < 768){
pageFlip.updateOrientation("portrait");
}else{
pageFlip.updateOrientation("landscape");
}

});

</script>

</body>
</html>
