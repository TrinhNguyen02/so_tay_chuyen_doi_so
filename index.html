<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook</title>

<style>

body{
margin:0;
background:#0f1115;
font-family:system-ui;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
}

/* Toolbar */

#toolbar{
position:fixed;
top:20px;
display:flex;
gap:10px;
background:rgba(30,30,35,0.85);
padding:10px 14px;
border-radius:12px;
backdrop-filter:blur(10px);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
z-index:10;
}

button{
border:none;
padding:10px 18px;
font-size:15px;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
transition:all .2s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.download{
background:#16a34a;
}

.download:hover{
background:#15803d;
}

#pageNum{
color:white;
padding:10px;
font-size:14px;
}

/* Flipbook */

#flipbook{
width:90vw;
max-width:1000px;
height:90vh;
margin-top:80px;
}

</style>

</head>

<body>

<div id="toolbar">

<button onclick="prevPage()">◀</button>

<button onclick="nextPage()">▶</button>

<a href="so_tay_ver1.2.pdf" download>
<button class="download">⬇ Download</button>
</a>

<span id="pageNum"></span>

</div>

<div id="flipbook"></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

const pageFlip = new St.PageFlip(
document.getElementById("flipbook"),
{
width:550,
height:733,

size:"stretch",

minWidth:315,
maxWidth:1000,
minHeight:400,
maxHeight:1533,

showCover:true,

mobileScrollSupport:true
}
);

/* Load PDF */

pageFlip.loadFromPDF("so_tay_ver1.2.pdf");

/* Buttons */

function nextPage(){
pageFlip.flipNext();
}

function prevPage(){
pageFlip.flipPrev();
}

/* Page counter */

pageFlip.on("flip",(e)=>{

document.getElementById("pageNum").innerText =
(e.data + 1) + " / " + pageFlip.getPageCount();

});

</script>

</body>
</html>
