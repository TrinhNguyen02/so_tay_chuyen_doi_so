<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flipbook PDF</title>

<link rel="icon" href="data:,">

<style>

body{
margin:0;
background:#111;
font-family:Arial;
overflow:hidden;
}

#viewer{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#book{
width:90vw;
height:90vh;
}

.page{
background:white;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
width:100%;
height:100%;
}

/* toolbar */

#toolbar{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:8px 12px;
border-radius:8px;
display:flex;
gap:8px;
z-index:10;
}

button{
background:#2196f3;
border:none;
color:white;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1976d2;
}

#pageInfo{
color:white;
padding:6px 10px;
}

</style>

</head>

<body>

<div id="toolbar">

<button id="prev">◀</button>

<div id="pageInfo">1 / ?</div>

<button id="next">▶</button>

<button id="zoomIn">＋</button>

<button id="zoomOut">－</button>

<button id="fullscreen">⛶</button>

<button id="download">⬇</button>

</div>


<div id="viewer">
<div id="book"></div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

const pdfURL = "so_tay_ver1.2.pdf";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const container = document.getElementById("book");

let pageFlip;
let scale = 1;

pdfjsLib.getDocument(pdfURL).promise.then(async pdf=>{

const pages=[];

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i);

const viewport=page.getViewport({scale:1.5});

const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");

canvas.width=viewport.width;

canvas.height=viewport.height;

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise;

const div=document.createElement("div");

div.className="page";

div.appendChild(canvas);

pages.push(div);

}

pages.forEach(p=>container.appendChild(p));

initFlipbook(pages.length);

});


function initFlipbook(totalPages){

pageFlip=new St.PageFlip(container,{

width:550,

height:733,

size:"stretch",

showCover:true,

usePortrait:false,

mobileScrollSupport:false

});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

updatePageInfo(totalPages);

pageFlip.on("flip",()=>{

updatePageInfo(totalPages);

});

}


function updatePageInfo(total){

const current=pageFlip.getCurrentPageIndex()+1;

document.getElementById("pageInfo").innerText=current+" / "+total;

}


/* controls */

document.getElementById("next").onclick=()=>pageFlip.flipNext();

document.getElementById("prev").onclick=()=>pageFlip.flipPrev();


/* zoom */

document.getElementById("zoomIn").onclick=()=>{

scale+=0.2;

document.getElementById("book").style.transform="scale("+scale+")";

}

document.getElementById("zoomOut").onclick=()=>{

scale-=0.2;

document.getElementById("book").style.transform="scale("+scale+")";

}


/* fullscreen */

document.getElementById("fullscreen").onclick=()=>{

document.documentElement.requestFullscreen();

}


/* download */

document.getElementById("download").onclick=()=>{

window.open(pdfURL);

}


/* keyboard */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight") pageFlip.flipNext();

if(e.key==="ArrowLeft") pageFlip.flipPrev();

});

</script>

</body>
</html>
