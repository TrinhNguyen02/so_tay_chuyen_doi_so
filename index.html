<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook</title>

<style>
body{
margin:0;
background:#1a1a1a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#flipbook{
width:90vw;
max-width:900px;
height:90vh;
}
</style>

</head>

<body>

<div id="flipbook"></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

const pageFlip = new St.PageFlip(
document.getElementById("flipbook"),
{
width:550,
height:733,
size:"stretch",
minWidth:315,
maxWidth:1000,
minHeight:400,
maxHeight:1533,
showCover:true,
mobileScrollSupport:true
}
);

pageFlip.loadFromPDF("so_tay_ver1.2.pdf");

</script>

</body>
</html>
