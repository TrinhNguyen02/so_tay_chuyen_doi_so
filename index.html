<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sách Lật Trang 3D</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.9/css/dflip.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dflip@1.0.9/css/themify-icons.min.css">

    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; }
        #my-flipbook { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="my-flipbook"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dflip@1.0.9/js/dflip.min.js"></script>

    <script>
        $(document).ready(function () {
            // Cấu hình DearFlip
            $("#my-flipbook").flipBook("so_tay_ver1.2.pdf", {
                webgl: true,              // Bật hiệu ứng 3D
                hard: "cover",            // Bìa cứng
                duration: 800,            // Tốc độ lật
                enableDownload: true,     // Cho phép tải về
                backgroundColor: "#1a1a1a"
            });
        });
    </script>
</body>
</html>
